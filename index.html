<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlockCraft Web</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="hud">
      <div class="brand">
        <h1>BlockCraft Web</h1>
        <p>A tiny browser sandbox inspired by Minecraft.</p>
      </div>

      <div class="panel controls">
        <h2>Controls</h2>
        <p><span>Move</span><strong>W A S D</strong></p>
        <p><span>Jump</span><strong>Space</strong></p>
        <p><span>Look</span><strong>Mouse</strong></p>
        <p><span>Break block</span><strong>Left click</strong></p>
        <p><span>Place block</span><strong>Right click</strong></p>
        <p><span>Switch block</span><strong>1 - 5</strong></p>
      </div>

      <div class="panel stats">
        <h2>Status</h2>
        <p><span>Selected</span><strong id="selected-block">Grass</strong></p>
        <p><span>Position</span><strong id="position-readout">0, 0, 0</strong></p>
        <p><span>Hint</span><strong id="hint-readout">Click the world to lock the mouse</strong></p>
      </div>
    </div>

    <canvas id="game"></canvas>

    <div class="crosshair" aria-hidden="true"></div>

    <div class="hotbar" id="hotbar"></div>

    <script src="./main.js"></script>
  </body>
</html>
